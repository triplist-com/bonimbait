name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-api:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify health
        run: |
          sleep 10
          curl -sf https://bonimbait-api.fly.dev/health || echo "Health check pending..."

  deploy-web:
    name: Verify Frontend Deployment
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - name: Wait for Vercel deployment
        run: |
          echo "Vercel auto-deploys from GitHub pushes to main."
          echo "Waiting for deployment to propagate..."
          sleep 30

      - name: Verify frontend
        run: |
          curl -sf https://bonimbait.com -o /dev/null && echo "Frontend: OK" || echo "Frontend: pending deployment"

  smoke-tests:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run smoke tests
        run: |
          python scripts/deploy/smoke_test.py \
            --api-url https://bonimbait-api.fly.dev \
            --web-url https://bonimbait.com
