version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: bonimbait-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bonimbait
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/setup_db.sql:/docker-entrypoint-initdb.d/01_setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bonimbait"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
