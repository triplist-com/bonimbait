# Render Blueprint — Bonimbait API
# https://render.com/docs/blueprint-spec
#
# Deploy: Push to GitHub → Render Dashboard → New → Blueprint → Connect repo
#
# Frontend stays on Vercel. Database stays on Supabase.
# This Blueprint deploys only the FastAPI backend.

services:
  # ─── FastAPI Backend (Docker) ───────────────────────────────────────
  - type: web
    name: bonimbait-api
    runtime: docker
    region: frankfurt
    plan: starter
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false  # set manually — Supabase connection string
      - key: ANTHROPIC_API_KEY
        sync: false  # set manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false  # set manually in Render dashboard
      - key: CORS_ORIGINS
        value: https://bonimbait.com,https://www.bonimbait.com,http://localhost:3000
      - key: ENV
        value: production
    healthCheckPath: /health
